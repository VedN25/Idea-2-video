name: Bug Report
description: Report a bug to help us improve
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the form below.
  - type: checkboxes
    id: prerequisites
    attributes:
      label: Prerequisites
      options:
        - label: I have searched existing issues and this is not a duplicate
          required: true
        - label: I am using the latest version of the codebase
          required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: What version of Idea2Video are you using?
      placeholder: "0.1.0 or commit hash"
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: Where are you running this?
      placeholder: "Local development / Vercel / Docker / Other"
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
      placeholder: "When I click 'Generate Video', the app crashes with..."
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. Scroll down to '...'
        4. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
      placeholder: "The video should generate and show a preview..."
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
      placeholder: "The app crashes with TypeError: Cannot read property 'id' of undefined"
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Error Logs / Screenshots
      description: Paste any relevant error messages, stack traces, or screenshots
      render: shell
      placeholder: "$"
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other information, configuration, or data that might help
      placeholder: "Using Clerk auth, Turso DB, OpenRouter API..."
  - type: checkboxes
    id: terms
    attributes:
      label: Code of Conduct
      options:
        - label: I agree to follow the Code of Conduct
          required: true
